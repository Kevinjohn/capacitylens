<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Defence-in-depth hardening that's safe to ship in the HTML itself and
         doesn't break the Vite dev/build pipeline. A full policy (script-src,
         style-src, connect-src) belongs in a response header at the host/CDN. -->
    <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none'" />
    <title>Floaty</title>
    <!-- Set the colour scheme before first paint so dark-mode users don't get a
         flash of light. Mirrors readStoredTheme()/resolveTheme() in
         src/lib/theme.ts (default: light); main.tsx re-applies + wires changes. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem('floaty/theme') || 'light'
          var dark = p === 'dark' || (p === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        } catch (e) {
          /* storage/matchMedia unavailable — leave the default light palette */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
