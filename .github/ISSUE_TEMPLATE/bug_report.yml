name: Bug report
description: Something broke or behaves wrongly
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What you did, what you expected, what you got instead. Screenshots help a lot for schedule-grid issues.
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: How are you running it?
      options:
        - pnpm run dev (full-stack, local)
        - pnpm run dev:demo (browser-only demo)
        - Docker / docker compose
        - Self-hosted (own server)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: From Settings ("build <sha>"), a release tag, or `git rev-parse --short HEAD`.
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: e.g. macOS 15, Node 24.1, Chrome 138
  - type: textarea
    id: logs
    attributes:
      label: Logs / console errors
      description: Server output or browser console, if relevant.
      render: shell
