name: CodeQL

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '31 5 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: JavaScript / TypeScript
    # This private repository does not currently have private code scanning enabled. Avoid burning
    # runner minutes on an analysis GitHub will reject; the workflow activates automatically once
    # the repository is public, where standard hosted runners and public code scanning are free.
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
