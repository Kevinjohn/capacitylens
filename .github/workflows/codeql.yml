name: CodeQL

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '31 5 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: JavaScript / TypeScript
    # This private repository does not currently have private code scanning enabled. Avoid burning
    # runner minutes on an analysis GitHub will reject; the workflow activates automatically once
    # the repository is public, where standard hosted runners and public code scanning are free.
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
