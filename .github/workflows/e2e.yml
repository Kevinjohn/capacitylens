name: e2e

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '47 6 3 * *'

# Pre-launch cost control: automatic runs are skipped while the repository is private; a manual
# dispatch still provides an explicit Chromium check. Once public, PR/main/tag/monthly coverage
# resumes and this workflow supplies the README's dedicated E2E badge.

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Chromium E2E
    if: github.event_name == 'workflow_dispatch' || github.event.repository.private == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
