name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run gate
      - run: npm run type-check --workspace=shared
      - run: npm run gate:server
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
