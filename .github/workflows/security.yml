name: security

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '19 4 * * 2'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    name: Full-history secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          deny-licenses: AGPL-1.0-only, AGPL-1.0-or-later, SSPL-1.0

  sbom:
    name: Source SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: capacitylens.spdx.json
          artifact-name: capacitylens-source-sbom

  containers:
    name: Container vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build API image
        run: docker build --target api --tag capacitylens-api:security .
      - name: Build web image
        run: docker build --target web --tag capacitylens-web:security .
      - name: Build internal TLS initializer image
        run: docker build --target internal-tls --tag capacitylens-internal-tls:security .
      - name: Scan API image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: capacitylens-api:security
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan web image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: capacitylens-web:security
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan internal TLS initializer image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: capacitylens-internal-tls:security
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  # DAST policy (2026-07-17): the BLOCKING scan validates the HARDENED posture — the
  # configuration we document as recommended and must keep delivering. The out-of-the-box
  # default (open instance, optional hardening off) is scanned separately below as a
  # non-blocking weekly job: ZAP rightly warns about the separations the default
  # deliberately leaves off, and those findings are accepted visibility, not regressions.
  dast:
    name: OWASP ZAP baseline (hardened posture)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Password auth ON plus the optional hardening a security-conscious operator enables:
      # required MFA, scheduled backups, and the storage/log-forwarding attestations.
      # http:// is permitted for BETTER_AUTH_URL because localhost is a loopback origin
      # (auth.ts refuses plaintext only for non-loopback production origins).
      CAPACITYLENS_AUTH: password
      CAPACITYLENS_REQUIRE_MFA: '1'
      CAPACITYLENS_BACKUP_INTERVAL_MIN: '60'
      CAPACITYLENS_STORAGE_ENCRYPTED: '1'
      CAPACITYLENS_SECURITY_LOG_FORWARDING: '1'
      BETTER_AUTH_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Mint CI-only credentials
        # Random per run; the stack is ephemeral and holds no real data. Minted at runtime so
        # no secret-shaped literal ever sits in the repository for scanners to flag, and masked
        # so later steps' env listings do not print them. The setup token satisfies the
        # fresh-password-instance first-run requirement (it is never used by the scan itself).
        run: |
          auth_secret="$(openssl rand -hex 32)"
          setup_token="$(openssl rand -hex 32)"
          echo "::add-mask::$auth_secret"
          echo "::add-mask::$setup_token"
          echo "BETTER_AUTH_SECRET=$auth_secret" >> "$GITHUB_ENV"
          echo "CAPACITYLENS_SETUP_TOKEN=$setup_token" >> "$GITHUB_ENV"
      - name: Start production stack
        run: docker compose up --build --detach
      - name: Wait for the proxied API
        run: |
          for _ in {1..45}; do
            if curl --fail --silent http://localhost:8080/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          docker_name: ghcr.io/zaproxy/zaproxy:stable@sha256:8d387b1a63e3425beef4846e39719f5af2a787753af2d8b6558c6257d7a577a2
          target: http://localhost:8080
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-baseline-report
          rules_file_name: .zap/rules.tsv
      - name: Show Compose logs on failure
        if: failure()
        run: docker compose logs
      - name: Stop production stack
        if: always()
        run: docker compose down --volumes

  dast-default:
    name: OWASP ZAP baseline (default posture, informational)
    # Weekly + manual only: this job documents the accepted residual surface of the relaxed
    # default posture. It uploads its report as an artifact and never blocks a push.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # The out-of-the-box posture: open instance explicitly accepted, every optional
      # hardening left off (matching what a first-run community deployment gets).
      CAPACITYLENS_ALLOW_OPEN_IN_PRODUCTION: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Start production stack
        run: docker compose up --build --detach
      - name: Wait for the proxied API
        run: |
          for _ in {1..45}; do
            if curl --fail --silent http://localhost:8080/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          docker_name: ghcr.io/zaproxy/zaproxy:stable@sha256:8d387b1a63e3425beef4846e39719f5af2a787753af2d8b6558c6257d7a577a2
          target: http://localhost:8080
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-baseline-report-default
          rules_file_name: .zap/rules.tsv
      - name: Show Compose logs on failure
        if: failure()
        run: docker compose logs
      - name: Stop production stack
        if: always()
        run: docker compose down --volumes

  release-provenance:
    name: Release SBOM and provenance
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Package the web build
        run: tar -czf capacitylens-web.tar.gz dist
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: capacitylens.spdx.json
          artifact-name: capacitylens-release-sbom
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            capacitylens-web.tar.gz
            capacitylens.spdx.json
