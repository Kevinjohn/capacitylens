# Monthly, grouped — enough to keep Better Auth & friends patched without
# a weekly PR drizzle on a solo-maintainer repo.
version: 2
updates:
  - package-ecosystem: npm
    # pnpm owns one lockfile for the whole workspace. Current Dependabot/pnpm
    # tooling rejects member-directory updates when pnpm-workspace.yaml and the
    # lockfile live above them, so scan and update the workspace from its root.
    directory: /
    schedule:
      interval: monthly
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
