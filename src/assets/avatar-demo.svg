<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" aria-hidden="true" focusable="false">
  <!-- Cosmetic illustrated profile avatar for the demo (fake) sign-in screen. No real
       person; swap this file to change the face shown. See src/components/FakeSignIn.tsx. -->
  <defs>
    <clipPath id="floaty-avatar-clip"><circle cx="48" cy="48" r="48" /></clipPath>
    <linearGradient id="floaty-avatar-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0e7ff" />
      <stop offset="1" stop-color="#c7d2fe" />
    </linearGradient>
  </defs>
  <g clip-path="url(#floaty-avatar-clip)">
    <rect width="96" height="96" fill="url(#floaty-avatar-bg)" />
    <!-- shoulders / shirt -->
    <path d="M12 96c0-19.9 16.1-36 36-36s36 16.1 36 36Z" fill="#6366f1" />
    <!-- neck -->
    <rect x="41" y="49" width="14" height="17" rx="7" fill="#e7b48a" />
    <!-- head -->
    <circle cx="48" cy="39" r="18" fill="#f0c098" />
    <!-- hair -->
    <path d="M30 39a18 18 0 0 1 36 0c0-5.2-2.5-12.4-7.4-15.4-1.9 3-5.1 4.6-9.1 4.6-4.6 0-7-1.7-9-4.6C34.6 26.4 30 33.8 30 39Z" fill="#4a3526" />
  </g>
</svg>
