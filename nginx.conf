# nginx config for the `web` service: serve the built Vite SPA and reverse-proxy
# /api/* to the `api` service (same-origin, so CORS stays fail-closed and the
# client's `${VITE_CAPACITYLENS_API}/api/...` requests never cross an origin).
#
# Trust only a single well-formed scheme value from the local/public edge; otherwise use the
# scheme of the connection nginx actually received. The Compose port binds loopback by default,
# so an internet client cannot reach this hop around the edge proxy.
map $http_x_forwarded_proto $capacitylens_public_proto {
    default $scheme;
    "http" http;
    "https" https;
}

# This mirrors the documented production topology (docs/self-hosting.md):
#   /        -> dist/ (Vite build, history-API fallback to index.html)
#   /api/*   -> the Fastify daemon (here: the `api` Docker service on :8787)

server {
    # The web image is deliberately unprivileged, so it listens above the privileged-port range.
    listen 8080;
    server_name _;
    server_tokens off;
    client_max_body_size 6m;

    # The internal API hop is encrypted and authenticated with a per-install CA generated into a
    # read-only volume before either long-running service starts. Name verification prevents a
    # different service on the Compose network from impersonating `api`; there is no HTTP fallback.
    proxy_ssl_trusted_certificate /run/capacitylens-internal-tls/ca.crt;
    proxy_ssl_verify on;
    proxy_ssl_verify_depth 1;
    proxy_ssl_server_name on;
    proxy_ssl_name api;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers mirroring the API's helmet posture (server/src/app.ts): nginx, not
    # Fastify, serves the actual HTML, and index.html's meta CSP can only carry object-src/
    # base-uri — a meta tag cannot express frame-ancestors, so without these headers the SPA
    # ships with no clickjacking/sniff/referrer protection at all. `always` keeps them on
    # error responses too. nginx inheritance rule: a location with ANY add_header of its own
    # drops every inherited one, so each location below that sets Cache-Control must repeat
    # this exact set. /api/ has no add_header and inherits these alongside helmet's — safe,
    # because the values are identical or strictly tighter (duplicate CSPs are both enforced).
    add_header Cache-Control "no-store" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'none'; form-action 'self'; report-uri /api/security/csp-report; report-to csp-endpoint" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Ignored by browsers over local HTTP, enforced when this same image sits behind TLS.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Reporting-Endpoints 'csp-endpoint="/api/security/csp-report"' always;

    # Compression for text assets (Vite emits hashed JS/CSS).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed asset filenames are content-addressed -> cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Re-declared: this location's Cache-Control add_header drops the inherited
        # server-level set (see the security-header comment above).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'none'; form-action 'self'; report-uri /api/security/csp-report; report-to csp-endpoint" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Reporting-Endpoints 'csp-endpoint="/api/security/csp-report"' always;
        try_files $uri =404;
    }

    # A missing file-like path must stay a 404 instead of receiving the SPA document. This avoids
    # web-cache-deception/content-type confusion while still serving real root assets such as the
    # service worker. Extensionless client-side routes continue through the history fallback.
    location ~* \.(?:css|js|mjs|json|map|svg|png|jpe?g|gif|webp|ico|woff2?|ttf|txt|xml|webmanifest)$ {
        try_files $uri =404;
    }

    # Reverse-proxy the API to the `api` service. The server mounts every route
    # under /api/, so the prefix is preserved (no rewrite). `api` resolves via
    # the compose network; 8787 is the server's default PORT.
    location /api/ {
        proxy_pass https://api:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        # Overwrite, never append client input. The API trusts this single hop for per-client limits.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $capacitylens_public_proto;
        proxy_set_header Connection "";
        # Client bulk operations allow 120s; leave proxy headroom so Nginx is not the first timeout.
        proxy_read_timeout 130s;
    }

    # Invite bearer paths and OAuth callback query secrets must never enter the Nginx access log.
    # These locations proxy identically to /api/ but suppress the request line entirely.
    location ~ ^/api/invites/[^/]+/(accept|signup)$ {
        access_log off;
        proxy_pass https://api:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $capacitylens_public_proto;
        proxy_set_header Connection "";
        proxy_read_timeout 130s;
    }

    location ~ ^/api/auth/(callback|oauth2/callback)/ {
        access_log off;
        proxy_pass https://api:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $capacitylens_public_proto;
        proxy_set_header Connection "";
        proxy_read_timeout 130s;
    }

    # /invite/<token> and /reset-password/<token> (src/router.tsx) carry single-use bearer
    # secrets in the URL path, and the default access log records the full request line —
    # so these must NEVER reach the access log (the Fastify-side log redaction only covers
    # /api paths). Serves the same SPA fallback as `location /`, but index.html is served
    # in-place: a try_files fallback (last parameter) would internally REDIRECT to
    # /index.html, finishing — and being access-logged with the original token-bearing
    # $request line — in `location /`, defeating `access_log off` here.
    location ~ ^/(invite|reset-password)/ {
        access_log off;
        add_header Cache-Control "no-store";
        # Re-declared: this location's Cache-Control add_header drops the inherited
        # server-level set (see the security-header comment above).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'none'; form-action 'self'; report-uri /api/security/csp-report; report-to csp-endpoint" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Reporting-Endpoints 'csp-endpoint="/api/security/csp-report"' always;
        try_files /index.html =404;
    }

    # SPA history-API fallback: unknown paths return index.html so client-side
    # routes (react-router) resolve. index.html itself is never cached so a fresh
    # deploy is picked up immediately.
    location / {
        add_header Cache-Control "no-store";
        # Re-declared: this location's Cache-Control add_header drops the inherited
        # server-level set (see the security-header comment above).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'none'; form-action 'self'; report-uri /api/security/csp-report; report-to csp-endpoint" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Reporting-Endpoints 'csp-endpoint="/api/security/csp-report"' always;
        try_files $uri $uri/ /index.html;
    }
}
