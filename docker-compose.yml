# CapacityLens — one reproducible deployment: the API server + the SPA, built
# from the single multi-stage Dockerfile (targets `internal-tls`, `api` and `web`).
#
#   internal-tls  : one-shot per-install CA/API certificate creation and renewal
#   web  (nginx)  : serves the built SPA, verifies and reverse-proxies /api -> api over TLS
#   api  (Node 24): the HTTPS Fastify daemon, SQLite DB + backups on named volumes
#
# Runtime config comes from a .env file you create from .env.example (compose
# auto-loads .env from this directory). `docker compose up --build` serves the
# app at http://localhost:8080 in server mode against a persisted DB.
#
services:
  internal-tls:
    build:
      context: .
      target: internal-tls
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # The one-shot initializer needs only CAP_CHOWN to make the API leaf key readable by uid 1000.
    # The CA key remains root-only; neither long-running container can read it.
    cap_add:
      - CHOWN
    tmpfs:
      - /tmp:size=8m,mode=1777
    volumes:
      - capacitylens-internal-tls:/tls

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=32m,mode=1777
    stop_grace_period: 15s
    depends_on:
      internal-tls:
        condition: service_completed_successfully
    # SQLite DB and the backups dir live INSIDE the mounted volumes so data
    # persists across container rebuilds. CAPACITYLENS_HOST=0.0.0.0 is
    # baked into the api image (compose-network reachability for nginx).
    environment:
      PORT: "8787"
      CAPACITYLENS_DB: /data/capacitylens.db
      # Backups are ON by default in Docker (hourly snapshots into the named
      # volume). To disable, set CAPACITYLENS_BACKUP_DIR= (explicitly empty) in
      # .env — the `-` form (not `:-`) only substitutes /backups when the var is
      # UNSET, so an empty value reaches the server and turns backups off. The
      # /backups volume mount below stays either way; it is simply unused then.
      CAPACITYLENS_BACKUP_DIR: ${CAPACITYLENS_BACKUP_DIR-/backups}
      # Same-origin via the nginx proxy -> CORS stays fail-closed. Override only
      # if you expose the API on a different origin.
      CAPACITYLENS_CORS_ORIGIN: ${CAPACITYLENS_CORS_ORIGIN:-}
      CAPACITYLENS_LOG: ${CAPACITYLENS_LOG:-1}
      CAPACITYLENS_HEALTH_DEEP: ${CAPACITYLENS_HEALTH_DEEP:-1}
      CAPACITYLENS_RATE_LIMIT: ${CAPACITYLENS_RATE_LIMIT:-300}
      SMALLSASS_ACCOUNT_REQUIRE_MFA: ${SMALLSASS_ACCOUNT_REQUIRE_MFA:-}
      SMALLSASS_ACCOUNT_SSO_MFA_ENFORCED: ${SMALLSASS_ACCOUNT_SSO_MFA_ENFORCED:-}
      SMALLSASS_ACCOUNT_PASSWORD_BREACH_CHECK: ${SMALLSASS_ACCOUNT_PASSWORD_BREACH_CHECK:-}
      # Compatibility aliases remain during the documented migration window. Empty values are
      # treated as absent, so an existing .env can move one key at a time without false conflicts.
      CAPACITYLENS_REQUIRE_MFA: ${CAPACITYLENS_REQUIRE_MFA:-}
      CAPACITYLENS_SSO_MFA_ENFORCED: ${CAPACITYLENS_SSO_MFA_ENFORCED:-}
      CAPACITYLENS_PASSWORD_BREACH_CHECK: ${CAPACITYLENS_PASSWORD_BREACH_CHECK:-}
      CAPACITYLENS_STORAGE_ENCRYPTED: ${CAPACITYLENS_STORAGE_ENCRYPTED:-}
      CAPACITYLENS_SECURITY_LOG_FORWARDING: ${CAPACITYLENS_SECURITY_LOG_FORWARDING:-}
      CAPACITYLENS_OPTIMISTIC_CONCURRENCY: ${CAPACITYLENS_OPTIMISTIC_CONCURRENCY:-1}
      CAPACITYLENS_HTTPS: ${CAPACITYLENS_HTTPS:-}
      CAPACITYLENS_INTERNAL_TLS_CERT: /run/capacitylens-internal-tls/api.crt
      CAPACITYLENS_INTERNAL_TLS_KEY: /run/capacitylens-internal-tls/api.key
      # Used only by the container healthcheck's single verified loopback request. It is not added
      # to Node's global outbound trust store.
      CAPACITYLENS_INTERNAL_TLS_CA: /run/capacitylens-internal-tls/ca.crt
      CAPACITYLENS_RATE_LIMIT_TRUST_FORWARDED: "1"
      CAPACITYLENS_BACKUP_INTERVAL_MIN: ${CAPACITYLENS_BACKUP_INTERVAL_MIN:-}
      CAPACITYLENS_BACKUP_KEEP: ${CAPACITYLENS_BACKUP_KEEP:-}
      # Canonical account configuration. Auth is OFF when mode is empty/unset.
      SMALLSASS_ACCOUNT_DEPLOYMENT_PROFILE: ${SMALLSASS_ACCOUNT_DEPLOYMENT_PROFILE:-}
      SMALLSASS_ACCOUNT_MODE: ${SMALLSASS_ACCOUNT_MODE:-}
      SMALLSASS_ACCOUNT_SECRET: ${SMALLSASS_ACCOUNT_SECRET:-}
      SMALLSASS_ACCOUNT_PUBLIC_URL: ${SMALLSASS_ACCOUNT_PUBLIC_URL:-}
      SMALLSASS_ACCOUNT_SETUP_TOKEN: ${SMALLSASS_ACCOUNT_SETUP_TOKEN:-}
      SMALLSASS_ACCOUNT_ALLOW_OPEN_SIGNUP: ${SMALLSASS_ACCOUNT_ALLOW_OPEN_SIGNUP:-}
      SMALLSASS_ACCOUNT_GOOGLE_CLIENT_ID: ${SMALLSASS_ACCOUNT_GOOGLE_CLIENT_ID:-}
      SMALLSASS_ACCOUNT_GOOGLE_CLIENT_SECRET: ${SMALLSASS_ACCOUNT_GOOGLE_CLIENT_SECRET:-}
      SMALLSASS_ACCOUNT_MICROSOFT_CLIENT_ID: ${SMALLSASS_ACCOUNT_MICROSOFT_CLIENT_ID:-}
      SMALLSASS_ACCOUNT_MICROSOFT_CLIENT_SECRET: ${SMALLSASS_ACCOUNT_MICROSOFT_CLIENT_SECRET:-}
      SMALLSASS_ACCOUNT_MICROSOFT_TENANT_ID: ${SMALLSASS_ACCOUNT_MICROSOFT_TENANT_ID:-}
      SMALLSASS_ACCOUNT_GITHUB_CLIENT_ID: ${SMALLSASS_ACCOUNT_GITHUB_CLIENT_ID:-}
      SMALLSASS_ACCOUNT_GITHUB_CLIENT_SECRET: ${SMALLSASS_ACCOUNT_GITHUB_CLIENT_SECRET:-}
      SMALLSASS_ACCOUNT_OIDC_PROVIDER_ID: ${SMALLSASS_ACCOUNT_OIDC_PROVIDER_ID:-}
      SMALLSASS_ACCOUNT_OIDC_LABEL: ${SMALLSASS_ACCOUNT_OIDC_LABEL:-}
      SMALLSASS_ACCOUNT_OIDC_BOOTSTRAP_EMAILS: ${SMALLSASS_ACCOUNT_OIDC_BOOTSTRAP_EMAILS:-}
      SMALLSASS_ACCOUNT_OIDC_CLIENT_ID: ${SMALLSASS_ACCOUNT_OIDC_CLIENT_ID:-}
      SMALLSASS_ACCOUNT_OIDC_CLIENT_SECRET: ${SMALLSASS_ACCOUNT_OIDC_CLIENT_SECRET:-}
      SMALLSASS_ACCOUNT_OIDC_DISCOVERY_URL: ${SMALLSASS_ACCOUNT_OIDC_DISCOVERY_URL:-}
      SMALLSASS_ACCOUNT_OIDC_ISSUER: ${SMALLSASS_ACCOUNT_OIDC_ISSUER:-}
      SMALLSASS_ACCOUNT_OIDC_SCOPES: ${SMALLSASS_ACCOUNT_OIDC_SCOPES:-}
      # Legacy aliases are passed through for existing installations during the compatibility
      # window. Canonical+legacy conflicts refuse startup instead of choosing a security posture.
      CAPACITYLENS_AUTH: ${CAPACITYLENS_AUTH:-}
      # The api image bakes NODE_ENV=production, and the production safety
      # interlock (server/src/productionGuard.ts) refuses to boot with auth OFF
      # unless you explicitly consent to an open instance. For the trusted-local
      # no-login mode set this to "1" in .env; it is ignored once auth is on.
      # Without it the api container restart-loops (`docker compose logs api`).
      CAPACITYLENS_ALLOW_OPEN_IN_PRODUCTION: ${CAPACITYLENS_ALLOW_OPEN_IN_PRODUCTION:-}
      # Single-company-per-instance policy (see AppOptions.multiAccount): default
      # off = one company; "1" allows more. SEED_DEMO=1 seeds the two-company demo
      # dataset on a never-initialised DB (pair it with MULTI_ACCOUNT=1) — a fresh
      # real instance starts EMPTY at the create-your-company screen.
      CAPACITYLENS_MULTI_ACCOUNT: ${CAPACITYLENS_MULTI_ACCOUNT:-}
      CAPACITYLENS_SEED_DEMO: ${CAPACITYLENS_SEED_DEMO:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      CAPACITYLENS_SETUP_TOKEN: ${CAPACITYLENS_SETUP_TOKEN:-}
      CAPACITYLENS_BOOTSTRAP_TOKEN: ${CAPACITYLENS_BOOTSTRAP_TOKEN:-}
      CAPACITYLENS_ALLOW_OPEN_SIGNUP: ${CAPACITYLENS_ALLOW_OPEN_SIGNUP:-}
      CAPACITYLENS_CREATE_ADMIN_ADMIN: ${CAPACITYLENS_CREATE_ADMIN_ADMIN:-}
      CAPACITYLENS_AUDIT: ${CAPACITYLENS_AUDIT:-}
      CAPACITYLENS_AUDIT_FILE: ${CAPACITYLENS_AUDIT_FILE:-}
      CAPACITYLENS_AUDIT_MAX_MB: ${CAPACITYLENS_AUDIT_MAX_MB:-}
      CAPACITYLENS_AUDIT_STDOUT: ${CAPACITYLENS_AUDIT_STDOUT:-1}
      CAPACITYLENS_GOOGLE_CLIENT_ID: ${CAPACITYLENS_GOOGLE_CLIENT_ID:-}
      CAPACITYLENS_GOOGLE_CLIENT_SECRET: ${CAPACITYLENS_GOOGLE_CLIENT_SECRET:-}
      CAPACITYLENS_MICROSOFT_CLIENT_ID: ${CAPACITYLENS_MICROSOFT_CLIENT_ID:-}
      CAPACITYLENS_MICROSOFT_CLIENT_SECRET: ${CAPACITYLENS_MICROSOFT_CLIENT_SECRET:-}
      CAPACITYLENS_MICROSOFT_TENANT_ID: ${CAPACITYLENS_MICROSOFT_TENANT_ID:-}
      CAPACITYLENS_GITHUB_CLIENT_ID: ${CAPACITYLENS_GITHUB_CLIENT_ID:-}
      CAPACITYLENS_GITHUB_CLIENT_SECRET: ${CAPACITYLENS_GITHUB_CLIENT_SECRET:-}
      CAPACITYLENS_SSO_PROVIDER_ID: ${CAPACITYLENS_SSO_PROVIDER_ID:-}
      CAPACITYLENS_SSO_LABEL: ${CAPACITYLENS_SSO_LABEL:-}
      CAPACITYLENS_SSO_BOOTSTRAP_EMAILS: ${CAPACITYLENS_SSO_BOOTSTRAP_EMAILS:-}
      CAPACITYLENS_SSO_CLIENT_ID: ${CAPACITYLENS_SSO_CLIENT_ID:-}
      CAPACITYLENS_SSO_CLIENT_SECRET: ${CAPACITYLENS_SSO_CLIENT_SECRET:-}
      CAPACITYLENS_SSO_DISCOVERY_URL: ${CAPACITYLENS_SSO_DISCOVERY_URL:-}
      CAPACITYLENS_SSO_ISSUER: ${CAPACITYLENS_SSO_ISSUER:-}
      CAPACITYLENS_SSO_AUTHORIZATION_URL: ${CAPACITYLENS_SSO_AUTHORIZATION_URL:-}
      CAPACITYLENS_SSO_TOKEN_URL: ${CAPACITYLENS_SSO_TOKEN_URL:-}
      CAPACITYLENS_SSO_SCOPES: ${CAPACITYLENS_SSO_SCOPES:-}
    volumes:
      - capacitylens-db:/data
      - capacitylens-backups:/backups
      - capacitylens-internal-tls:/run/capacitylens-internal-tls:ro
    expose:
      - "8787"

  web:
    build:
      context: .
      target: web
      args:
        # Inlined into the SPA at build time. EMPTY (the default) = server mode
        # against the SAME ORIGIN — nginx proxies /api to the api service, so it
        # works on any host with no per-host rebuild. Set to an ORIGIN (not "/api")
        # only to point the SPA at a different host. Empty no longer means
        # browser persistence; build with VITE_CAPACITYLENS_DEMO=1 for the in-memory demo.
        VITE_CAPACITYLENS_API: ${VITE_CAPACITYLENS_API:-}
        # Set VITE_CAPACITYLENS_DEMO=1 in .env to build the in-memory demo image
        # (no backend; wins over the API var). Empty = the default server build above.
        VITE_CAPACITYLENS_DEMO: ${VITE_CAPACITYLENS_DEMO:-}
        VITE_CAPACITYLENS_BUILD_SHA: ${VITE_CAPACITYLENS_BUILD_SHA:-}
        VITE_CAPACITYLENS_FEEDBACK_MAILTO: ${VITE_CAPACITYLENS_FEEDBACK_MAILTO:-}
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=16m,mode=1777
    stop_grace_period: 15s
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - capacitylens-internal-tls:/run/capacitylens-internal-tls:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    ports:
      # Bind loopback by default so a public TLS edge is the only internet-reachable hop and its
      # overwritten forwarding scheme can be trusted. Set WEB_BIND_IP deliberately for a platform
      # load balancer that reaches the container host over a private network.
      - "${WEB_BIND_IP:-127.0.0.1}:${WEB_PORT:-8080}:8080"

volumes:
  capacitylens-db:
  capacitylens-backups:
  capacitylens-internal-tls:
